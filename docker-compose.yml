services:
  db:
    image: postgres:16-alpine
    container_name: case_study_db
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  backend:
    build:
      context: ./app/backend
    container_name: case_study_backend
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: local-secret-key
      DJANGO_ALLOWED_HOSTS: "*"
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             gunicorn project.wsgi:application --bind 0.0.0.0:8000"

  frontend:
    build:
      context: ./app/frontend
    container_name: case_study_frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
