apiVersion: v1
kind: Namespace
metadata:
  name: case-study-task3

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: task3-nginx-config
  namespace: case-study-task3
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri /index.html;
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-server-task3
  namespace: case-study-task3
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-server-task3
  template:
    metadata:
      labels:
        app: web-server-task3
    spec:
      initContainers:
        - name: generate-runtime-page
          image: busybox:1.36
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          command:
            - sh
            - -c
            - |
              LAST5="$(echo "${POD_NAME}" | rev | cut -c1-5 | rev)"
              SERVING_HOST="Host-${LAST5}"
              cat > /work/index.html <<EOF
              <!doctype html>
              <html lang="en">
                <head>
                  <meta charset="UTF-8" />
                  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
                  <title>Task 3 Web Server</title>
                  <style>
                    body { font-family: Arial, sans-serif; margin: 24px; }
                    .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; max-width: 700px; }
                    code { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; }
                  </style>
                </head>
                <body>
                  <div class="card">
                    <h1>Task 3 Web Server</h1>
                    <p>pod-ip=<code>${POD_IP}</code></p>
                    <p>serving-host=<code>${SERVING_HOST}</code></p>
                    <p>pod-name=<code>${POD_NAME}</code></p>
                  </div>
                </body>
              </html>
              EOF
          volumeMounts:
            - name: web-content
              mountPath: /work
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: web-content
              mountPath: /usr/share/nginx/html
      volumes:
        - name: nginx-config
          configMap:
            name: task3-nginx-config
        - name: web-content
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: web-server-task3
  namespace: case-study-task3
spec:
  type: NodePort
  selector:
    app: web-server-task3
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081
