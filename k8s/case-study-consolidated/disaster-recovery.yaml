# Task 5: Disaster recovery - scheduled backups
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-backup-pvc
  namespace: case-study-consolidated
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: case-study-consolidated
spec:
  schedule: "*/30 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: backend
            role: db-backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-alpine
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: POSTGRES_PASSWORD
                - name: DB_HOST
                  value: db-primary
                - name: DB_NAME
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: POSTGRES_DB
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: POSTGRES_USER
              command:
                - sh
                - -c
                - |
                  set -eu
                  mkdir -p /backups
                  TS="$(date +%Y%m%d%H%M%S)"
                  OUT="/backups/${DB_NAME}-${TS}.dump"
                  pg_dump -h "${DB_HOST}" -U "${DB_USER}" -d "${DB_NAME}" -F c -f "${OUT}"
                  ls -lh "${OUT}"
                  ls -1t /backups/*.dump 2>/dev/null | tail -n +8 | xargs -r rm -f
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: db-backup-pvc
