# Cluster 1 - multi-node for Task 7 (node affinity)
# Create with: kind create cluster --name case-study-cluster-1 --config k8s/case-study-consolidated/kind-cluster1.yaml
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      - containerPort: 30090
        hostPort: 30090
        protocol: TCP
      - containerPort: 30300
        hostPort: 30300
        protocol: TCP
  - role: worker
  - role: worker
