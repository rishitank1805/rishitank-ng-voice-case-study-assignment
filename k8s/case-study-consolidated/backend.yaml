apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: case-study-consolidated
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: case-study-consolidated
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: wait-for-db-primary
          image: postgres:16-alpine
          command: ["sh", "-c", "until pg_isready -h db-primary -p 5432 -U appuser -d appdb; do echo waiting for db-primary; sleep 2; done"]
      containers:
        - name: backend
          image: local/case-backend:v1
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "python manage.py migrate && gunicorn project.wsgi:application --bind 0.0.0.0:8000"]
          ports:
            - containerPort: 8000
          env:
            - name: DJANGO_DEBUG
              value: "1"
            - name: DJANGO_ALLOWED_HOSTS
              value: "*"
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DJANGO_SECRET_KEY
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: DB_HOST
              value: db-primary
            - name: DB_PORT
              value: "5432"
