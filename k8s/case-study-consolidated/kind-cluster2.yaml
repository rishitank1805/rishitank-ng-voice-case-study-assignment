# Cluster 2 - multi-node for fault tolerance
# Create with: kind create cluster --name case-study-cluster-2 --config k8s/case-study-consolidated/kind-cluster2.yaml
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30081
        protocol: TCP
  - role: worker
  - role: worker
