apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: case-study-consolidated
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: case-study-consolidated
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: local/case-frontend:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
