apiVersion: v1
kind: Namespace
metadata:
  name: case-study

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: case-study
type: Opaque
stringData:
  POSTGRES_DB: appdb
  POSTGRES_USER: appuser
  POSTGRES_PASSWORD: apppass
  DJANGO_SECRET_KEY: local-secret-key
  POSTGRES_REPL_USER: repl_user
  POSTGRES_REPL_PASSWORD: repl_pass

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-primary-init
  namespace: case-study
data:
  01-create-replication-user.sql: |
    CREATE ROLE repl_user WITH REPLICATION LOGIN PASSWORD 'repl_pass';
  02-allow-replication.sh: |
    #!/bin/sh
    set -e
    echo "host replication repl_user 0.0.0.0/0 trust" >> "$PGDATA/pg_hba.conf"

---
apiVersion: v1
kind: Service
metadata:
  name: db-primary
  namespace: case-study
spec:
  selector:
    app: db-primary
  ports:
    - port: 5432
      targetPort: 5432

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-primary
  namespace: case-study
spec:
  serviceName: db-primary
  replicas: 1
  selector:
    matchLabels:
      app: db-primary
  template:
    metadata:
      labels:
        app: db-primary
    spec:
      containers:
        - name: postgres-primary
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_INITDB_ARGS
              value: "--auth-host=scram-sha-256"
            - name: POSTGRES_HOST_AUTH_METHOD
              value: trust
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U appuser -d appdb -h 127.0.0.1"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: initdb
          configMap:
            name: db-primary-init
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 4Gi

---
apiVersion: v1
kind: Service
metadata:
  name: db-replica
  namespace: case-study
spec:
  selector:
    app: db-replica
  ports:
    - port: 5432
      targetPort: 5432

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-replica
  namespace: case-study
spec:
  serviceName: db-replica
  replicas: 1
  selector:
    matchLabels:
      app: db-replica
  template:
    metadata:
      labels:
        app: db-replica
    spec:
      containers:
        - name: postgres-replica
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_REPL_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_REPL_USER
            - name: POSTGRES_REPL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_REPL_PASSWORD
          command:
            - sh
            - -c
            - |
              if [ ! -s /var/lib/postgresql/data/PG_VERSION ]; then
                rm -rf /var/lib/postgresql/data/*
                until pg_isready -h db-primary -p 5432 -U appuser -d appdb; do
                  echo "waiting for primary..."
                  sleep 2
                done
                export PGPASSWORD="${POSTGRES_REPL_PASSWORD}"
                pg_basebackup -h db-primary -D /var/lib/postgresql/data -U "${POSTGRES_REPL_USER}" -vP -w
                printf "primary_conninfo = 'host=db-primary port=5432 user=%s password=%s'\n" "${POSTGRES_REPL_USER}" "${POSTGRES_REPL_PASSWORD}" >> /var/lib/postgresql/data/postgresql.auto.conf
                touch /var/lib/postgresql/data/standby.signal
              fi
              exec docker-entrypoint.sh postgres
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U appuser -d appdb -h 127.0.0.1"]
            initialDelaySeconds: 15
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 4Gi

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: case-study
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: case-study
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: wait-for-db-primary
          image: postgres:16-alpine
          command: ["sh", "-c", "until pg_isready -h db-primary -p 5432 -U appuser -d appdb; do echo waiting for db-primary; sleep 2; done"]
      containers:
        - name: backend
          image: local/case-backend:v1
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "python manage.py migrate && gunicorn project.wsgi:application --bind 0.0.0.0:8000"]
          ports:
            - containerPort: 8000
          env:
            - name: DJANGO_DEBUG
              value: "1"
            - name: DJANGO_ALLOWED_HOSTS
              value: "*"
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DJANGO_SECRET_KEY
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: DB_HOST
              value: db-primary
            - name: DB_PORT
              value: "5432"

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: case-study
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: case-study
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: local/case-frontend:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
