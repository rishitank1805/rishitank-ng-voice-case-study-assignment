apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../
patches:
  - target:
      group: apps
      version: v1
      kind: StatefulSet
      name: db-primary
      namespace: case-study
    patch: |-
      - op: add
        path: /spec/template/spec/affinity
        value:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: db-role
                      operator: In
                      values:
                        - primary
  - target:
      group: apps
      version: v1
      kind: StatefulSet
      name: db-replica
      namespace: case-study
    patch: |-
      - op: add
        path: /spec/template/spec/affinity
        value:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: db-role
                      operator: In
                      values:
                        - replica
